<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Arcade | HTML5 Web Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" crossorigin="anonymous">

    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        nav { background-color: var(--bg-secondary); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; }
        .logo span { color: var(--accent); }

        .container { display: flex; flex: 1; padding: 2rem 5%; gap: 2rem; }
        main { flex: 1; }
        aside { width: 300px; }
        .ad-placeholder { background-color: #1e293b; border: 1px dashed #475569; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.8rem; border-radius: 4px; margin: 1rem auto; }
        .ad-leaderboard { width: 728px; height: 90px; max-width: 95%; }
        .ad-sidebar { width: 100%; height: 600px; position: sticky; top: 5rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.2s; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-thumb { width: 100%; height: 180px; background-size: cover; background-position: center; }
        .card-body { padding: 1.5rem; display: flex; flex-direction: column; flex: 1; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; flex: 1; }
        .play-btn { background-color: var(--accent); color: white; border: none; padding: 0.75rem; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.95); z-index: 1000; display: none; flex-direction: column; padding: 2rem; }
        .modal.active { display: flex; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-close { background: none; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; }
        .modal-content { display: flex; flex: 1; gap: 1.5rem; }
        .iframe-container { flex: 3; background: #000; border-radius: 8px; overflow: hidden; }
        .iframe-container iframe { width: 100%; height: 100%; border: none; }

        #admin-panel { background-color: var(--bg-secondary); border-top: 2px solid var(--accent); padding: 2rem 5%; display: none; }
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        .btn { padding: 0.75rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-primary { background-color: var(--accent); color: white; }
        
        @media (max-width: 900px) { .container { flex-direction: column; } aside { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-gamepad"></i> NEXUS<span>ARCADE</span></div>
    </nav>

    <div class="ad-placeholder ad-leaderboard">ADVERTISEMENT</div>

    <div class="container">
        <main>
            <div class="grid" id="game-grid"></div>
        </main>
        <aside>
            <div class="ad-placeholder ad-sidebar">ADVERTISEMENT</div>
        </aside>
    </div>

    <div class="modal" id="game-modal">
        <div class="modal-header">
            <h2 id="modal-title">Game</h2>
            <button class="modal-close" onclick="closeGame()"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="modal-content">
            <div class="iframe-container"><iframe id="game-iframe" src=""></iframe></div>
        </div>
    </div>

    <section id="admin-panel">
        <div class="admin-grid">
            <div>
                <h3>Add New Game</h3>
                <input type="text" id="g-title" placeholder="Title">
                <input type="text" id="g-url" placeholder="URL">
                <button class="btn btn-primary" onclick="saveGameData()">Add</button>
            </div>
            <div id="admin-table-body"></div>
        </div>
    </section>

    <script>
        let games = [];

        async function loadGames() {
            try {
                // NEW HEAVY-DUTY PROXY
                const proxy = "https://api.allorigins.win/get?url=";
                const feedUrl = "https://gamemonetize.com/feed.php?format=json&category=All&type=mobile";

                console.log("Fetching games...");
                const response = await fetch(proxy + encodeURIComponent(feedUrl));
                const result = await response.json();
                
                // AllOrigins returns the data as a string in the 'contents' property
                const data = JSON.parse(result.contents);

                let gamesArray = Array.isArray(data) ? data : (data.games || Object.values(data));

                games = gamesArray.slice(0, 100).map(game => ({
                    title: game.title || "Game",
                    thumb: game.thumb || game.primary_thumb,
                    url: game.url,
                    desc: game.description || ""
                }));

                console.log("Successfully loaded " + games.length + " games.");
                renderGrid();

            } catch (err) {
                console.error("Critical Error:", err);
                document.getElementById('game-grid').innerHTML = "<h2>Failed to load games. Check the console.</h2>";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = games.map((game, i) => `
                <div class="card">
                    <div class="card-thumb" style="background-image: url('${game.thumb}')"></div>
                    <div class="card-body">
                        <h3 class="card-title">${game.title}</h3>
                        <button class="play-btn" onclick="openGame(${i})">Play Now</button>
                    </div>
                </div>
            `).join('');
        }

        function openGame(i) {
            document.getElementById('modal-title').innerText = games[i].title;
            document.getElementById('game-iframe').src = games[i].url;
            document.getElementById('game-modal').classList.add('active');
        }

        function closeGame() {
            document.getElementById('game-modal').classList.remove('active');
            document.getElementById('game-iframe').src = "";
        }

        window.onload = loadGames;
    </script>
</body>
</html>
