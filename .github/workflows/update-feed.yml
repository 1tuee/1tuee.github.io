name: Update Game Feed Daily

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Live Game Feed Data
        run: |
          # Pulls the clean, native live feed straight into your games list
          curl -s "https://gamemonetize.com/feed.php?format=0&num=100&page=1" > games.json

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          git diff-index --quiet HEAD || (git commit -m "Removed premium games and reverted to pure live feed" && git push)
