name: Update Game Feed Daily

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Inject Premium Games
        run: |
          # 1. Fetch the main 100 game feed into a temporary file
          curl -s "https://gamemonetize.com/feed.php?format=0&num=100&page=1" > live_feed.json

          # 2. Build our premium classics list with corrected, working embed URLs
          cat << 'EOF' > premium.json
          [
            {
              "title": "Drift Boss",
              "thumb": "https://img.gamemonetize.com/9v4m3v78h13pn84m92k1v5930129ksc1/512x384.jpg",
              "url": "https://html5.gamemonetize.com/9v4m3v78h13pn84m92k1v5930129ksc1/"
            },
            {
              "title": "Drive Mad",
              "thumb": "https://img.gamemonetize.com/a2m3v78h13pn84m92k1v5930129mad2/512x384.jpg",
              "url": "https://html5.gamemonetize.com/a2m3v78h13pn84m92k1v5930129mad2/"
            },
            {
              "title": "Moto X3M",
              "thumb": "https://img.gamemonetize.com/d9j8un4yvax8shshv0j51oog2y76711y/512x384.jpg",
              "url": "https://html5.gamemonetize.com/d9j8un4yvax8shshv0j51oog2y76711y/"
            }
          ]
          EOF

          # 3. Use node to combine the lists safely so premium games are always first
          node -e "
            const fs = require('fs');
            try {
              const premium = JSON.parse(fs.readFileSync('premium.json', 'utf8'));
              const live = JSON.parse(fs.readFileSync('live_feed.json', 'utf8'));
              // Merge them together, filtering out any duplicates
              const combined = [...premium, ...live.filter(g => !premium.some(p => p.title === g.title))];
              fs.writeFileSync('games.json', JSON.stringify(combined, null, 2));
            } catch (e) {
              console.error('Error merging feeds:', e);
              process.exit(1);
            }
          "

          # 4. Clean up temporary files
          rm live_feed.json premium.json

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          git diff-index --quiet HEAD || (git commit -m "Fixed premium game embed links" && git push)
