name: Update Game Feed Daily

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Merge Game Feeds
        run: |
          # 1. Download the live 100 game feed
          curl -s "https://gamemonetize.com/feed.php?format=0&num=100&page=1" > live_feed.json

          # 2. Hardcode the premium working links
          cat << 'EOF' > premium.json
          [
            {
              "title": "Drift Boss",
              "thumb": "https://img.gamemonetize.com/9v4m3v78h13pn84m92k1v5930129ksc1/512x384.jpg",
              "url": "https://html5.gamemonetize.com/9v4m3v78h13pn84m92k1v5930129ksc1/"
            },
            {
              "title": "Drive Mad",
              "thumb": "https://img.gamemonetize.com/a2m3v78h13pn84m92k1v5930129mad2/512x384.jpg",
              "url": "https://html5.gamemonetize.com/a2m3v78h13pn84m92k1v5930129mad2/"
            },
            {
              "title": "Moto X3M",
              "thumb": "https://img.gamemonetize.com/d9j8un4yvax8shshv0j51oog2y76711y/512x384.jpg",
              "url": "https://html5.gamemonetize.com/d9j8un4yvax8shshv0j51oog2y76711y/"
            }
          ]
          EOF

          # 3. Combine both feeds into games.json safely using jq
          jq -s '.[0] + .[1] | unique_by(.title)' premium.json live_feed.json > games.json

          # 4. Clean up the temporary workspace
          rm live_feed.json premium.json

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          git diff-index --quiet HEAD || (git commit -m "Fixed game feed automation using native parsing" && git push)
